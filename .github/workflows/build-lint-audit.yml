name: Build, Lint and Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-lint-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run npm audit
        run: npm audit --audit-level=high
